services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: taskflow-app
    container_name: taskflow-app
    working_dir: /var/www/html
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: taskflow
      DB_USERNAME: root
      DB_PASSWORD: T4skf1oW.
    depends_on:
      db:
        condition: service_started
      gateways:
        condition: service_started
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 6g

  web:
    image: nginx:1.25-alpine
    container_name: taskflow-web
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

  db:
    image: mysql:8.0
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: T4skf1oW.
      MYSQL_DATABASE: taskflow
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2g

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: taskflow-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256m

  gateways:
    image: matheusprotzen/gateways-mock
    container_name: gateways-mock
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  dbdata:

networks:
  backend:
    driver: bridge